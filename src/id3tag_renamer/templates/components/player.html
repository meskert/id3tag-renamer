<!-- Mini Audio Player (fixed bottom bar) -->
<div id="mini-player" class="d-none position-fixed bottom-0 start-0 end-0 bg-dark text-white py-2 px-3" style="z-index: 1055; box-shadow: 0 -2px 8px rgba(0,0,0,.4);">
    <div class="d-flex align-items-center gap-3">
        <i class="bi bi-music-note-beamed text-success fs-5"></i>
        <span id="player-filename" class="text-truncate flex-grow-1 small fw-semibold"></span>
        <audio id="player-audio" controls preload="none" style="height: 32px; min-width: 260px; max-width: 420px;"></audio>
        <button id="player-close" type="button" class="btn btn-sm btn-outline-secondary text-white border-secondary" title="Close player">&times;</button>
    </div>
</div>
