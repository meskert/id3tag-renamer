<!-- Single File Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form action="/update_tags" method="post" enctype="multipart/form-data">
                <input type="hidden" name="mode" value="manual">
                <input type="hidden" name="direct_apply" value="1">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit File Tags</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="selected_files" id="edit-file-index">
                <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small text-muted">Filename (without extension)</label>
                            <input type="text" class="form-control" name="new_filename" id="edit-filename">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Artist</label>
                            <input type="text" class="form-control" name="artist" id="edit-artist">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Album</label>
                            <input type="text" class="form-control" name="album" id="edit-album">
                        </div>
                        <div class="col-md-9">
                            <label class="form-label small text-muted">Title</label>
                            <input type="text" class="form-control" name="title" id="edit-title">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted">Track #</label>
                            <input type="text" class="form-control" name="track" id="edit-track">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Genre</label>
                            <input type="text" class="form-control" name="genre" id="edit-genre">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Date</label>
                            <input type="text" class="form-control" name="date" id="edit-date">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Comment</label>
                            <input type="text" class="form-control" name="comment" id="edit-comment">
                        </div>
                        <div class="col-12 text-center" id="edit-album-art-container" style="display: none;">
                            <img id="edit-album-art-preview" src="#" alt="Album Art" class="img-fluid rounded shadow-sm mb-2" style="max-height: 150px;">
                        </div>
                        <div class="col-12">
                            <label class="form-label small text-muted">Update Album Art</label>
                            <input type="file" class="form-control" name="album_art" id="edit-album-art-input" accept="image/jpeg,image/png">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
