<!-- Directory Browser Modal -->
<div class="modal fade" id="browseModal" tabindex="-1" aria-labelledby="browseModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="browseModalLabel">Browse Music Directory</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb" id="browser-breadcrumbs">
                        <li class="breadcrumb-item"><a href="#" data-path="">Root</a></li>
                    </ol>
                </nav>
                <div class="list-group" id="browser-list" style="max-height: 400px; overflow-y: auto;">
                    <!-- Directories will be listed here -->
                </div>
            </div>
            <div class="modal-footer">
                <div class="me-auto">
                    <strong>Selected:</strong> <span id="selected-path-display">{{ directory }}</span>
                </div>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirm-browse">Select Directory</button>
            </div>
        </div>
    </div>
</div>
